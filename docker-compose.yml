services:
  postgres:
    image: postgres:16-alpine
    container_name: healx-postgres
    environment:
      POSTGRES_DB: healx
      POSTGRES_USER: healx
      POSTGRES_PASSWORD: healx
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healx -d healx"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: healx-redis
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
